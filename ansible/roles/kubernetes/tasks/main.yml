---
- name: Eliminar el fichero de swap de /etc/fstab
  ansible.posix.mount:
    path: "{{ item }}"
    fstype: swap
    state: absent
  with_items:
    - swap
    - none

- name: Desactivar el swap
  ansible.builtin.command: swapoff -a
  when: ansible_facts['swaptotal_mb'] > 0

- name: Añadir el repositorio apt de Kubernetes (formato DEB822)
  ansible.builtin.deb822_repository:
    name: kubernetes
    types: deb
    uris: https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/
    suites: /
    signed_by: https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key
    state: present

- name: Actualizar el índice de paquetes
  ansible.builtin.apt:
    update_cache: true

- name: Instalar los paquetes de Kubernetes
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: latest

- name: Configurar la dirección IP del nodo
  ansible.builtin.lineinfile:
    path: /etc/default/kubelet
    create: true
    line: KUBELET_EXTRA_ARGS=--node-ip={{ node_ip }}

- name: Reiniciar el servicio kubelet
  ansible.builtin.service:
    name: kubelet
    daemon_reload: true
    state: restarted
