---
- name: Añadir el repositorio apt de Docker (formato DEB822)
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
    suites: "{{ ansible_facts['distribution_release'] | lower }}"
    components: stable
    architectures: "{{ ansible_facts['architecture'] | regex_replace('x86_64', 'amd64') | regex_replace('aarch64', 'arm64') }}"
    signed_by: https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg
    state: present

- name: Actualizar el índice de paquetes
  ansible.builtin.apt:
    update_cache: true

- name: Instalar Docker y sus dependencias
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: latest

- name: Arrancar el servicio Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Parche para que containerd arranque correctamente
  ansible.builtin.shell: |
    containerd config default | tee /etc/containerd/config.toml >/dev/null 2>&1
    sed -i 's/SystemdCgroup \= false/SystemdCgroup \= true/g' /etc/containerd/config.toml

- name: Reiniciar containerd
  ansible.builtin.service:
    name: containerd
    daemon_reload: true
    state: restarted
